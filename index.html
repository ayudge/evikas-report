<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ई-विकास पोर्टल सत्यापन रिपोर्ट</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f3f3f3;
      color: #111;
      font-family: "Noto Sans Devanagari", "Mangal", "Arial Unicode MS", Arial, sans-serif;
    }
    :root {
      --a4-landscape-width: 297mm;
      --a4-landscape-height: 210mm;
      --print-margin: 3mm;
      --report-width: calc(var(--a4-landscape-width) - (var(--print-margin) * 2));
      --report-height: calc(var(--a4-landscape-height) - (var(--print-margin) * 2));
    }
    .report-page {
      width: var(--report-width);
      min-height: var(--report-height);
      margin: 0 auto;
      padding: 9mm 2mm 4mm 2mm;
      background: #fff;
      border: 1px solid #000;
    }
    h1 {
      margin: 0 0 10mm;
      text-align: center;
      font-size: 35px;
      line-height: 1;
      font-weight: 900;
      color: #33434b;
      letter-spacing: -0.5px;
      text-shadow: 0 0 0.5px #33434b;
    }
    .top-line,
    .village-line {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
    }
    .top-line { margin-bottom: 16mm; }
    .village-line { margin-bottom: 9px; }
    label { font-weight: 900; }
    input, select, textarea {
      border: 2px solid #555;
      background: #fff;
      color: #111;
      font: inherit;
      font-weight: 800;
      min-height: 28px;
      padding: 2px 6px;
    }
    input::placeholder, textarea::placeholder { color: #777; opacity: 0.75; font-weight: 700; }
    .halka-name { width: 165px; }
    .halka-no { width: 68px; }
    .circle-select { width: 130px; height: 36px; }
    .patwari-name { width: 120px; }
    .village-name { width: 184px; }
    .static-place { margin-left: 4px; }
    .screen-only.controls { margin: 14px 0 16px; display: flex; gap: 12px; }
    button, .upload-label {
      border: 1px solid #333;
      background: #efefef;
      padding: 7px 14px;
      font: 800 15px "Noto Sans Devanagari", "Mangal", Arial, sans-serif;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 16px;
      font-weight: 900;
    }
    th, td {
      border: 1.7px solid #000;
      text-align: center;
      vertical-align: top;
      padding: 5px 4px;
    }
    th { height: 15mm; font-size: 13px; line-height: 1.25; font-weight: 900; }
    td { min-height: 22mm; height: 22mm; }
    .col-serial { width: 4%; }
    .col-name { width: 13%; }
    .col-count { width: 7%; }
    .col-survey { width: 11%; }
    .col-area { width: 9%; }
    .col-reason { width: 22%; }
    .col-status { width: 11%; }
    .col-comment { width: 16%; }
    .col-delete { width: 7%; }
    .table-input, .table-select, .table-textarea {
      width: 100%;
      border: 0;
      min-height: 28px;
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      padding: 2px;
    }
    .count-input { font-size: 20px; }
    .table-textarea { resize: vertical; overflow: hidden; line-height: 1.25; }
    .reason-select { font-size: 16px; text-align: left; white-space: normal; height: auto; }
    .survey-box, .area-box {
      width: 96%;
      height: 22px;
      margin: 2px auto;
      border: 2px solid #777;
      display: block;
      text-align: center;
      font-size: 19px;
      line-height: 18px;
      padding: 0 3px;
    }
    .signature-section {
      width: 275px;
      margin: 14px 0 0 auto;
      text-align: left;
      font-size: 15px;
      line-height: 1.75;
      font-weight: 900;
    }
    .signature-preview {
      display: block;
      width: 92px;
      max-height: 64px;
      object-fit: contain;
      margin: 0 auto 2px;
    }
    .signature-title { text-align: center; line-height: 1.2; }
    .signature-upload { margin: 20px 0 5px auto; width: 275px; text-align: center; }
    .hidden-file { display: none; }
    @media print {
      html, body { width: auto; height: auto; background: #fff; }
      body { margin: 0; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .report-page {
        width: var(--report-width);
        height: var(--report-height);
        min-height: 0;
        margin: 0;
        border: 0;
        padding: 6mm 1mm 2mm 1mm;
        overflow: hidden;
        break-after: avoid;
        break-inside: avoid;
        page-break-after: avoid;
        page-break-inside: avoid;
      }
      h1 { margin-bottom: 7mm; }
      .top-line { margin-bottom: 9mm; }
      .village-line { margin-bottom: 3mm; }
      table { border: 2px solid #000; }
      th { height: 12mm; background: #fafafa; }
      td { min-height: 17mm; height: 17mm; }
      th, td { border-color: #000; }
      .signature-section {
        margin-top: 3mm;
        margin-right: 2mm;
        width: 330px;
        font-size: 16px;
        line-height: 1.5;
      }
      .signature-title { font-size: 16px; font-weight: 900; }
      .signature-preview { width: 105px; max-height: 55px; }
      .screen-only, .delete-cell, .col-delete, .patwari-entry { display: none !important; }
      .col-name { width: 14%; }
      .col-survey { width: 12%; }
      .col-area { width: 10%; }
      .col-reason { width: 25%; }
      .col-status { width: 12%; }
      input, select, textarea {
        border-color: #555;
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
      }
      .table-input, .table-select, .table-textarea { border: 0; }
      @page { size: A4 landscape; margin: var(--print-margin); }
    }
  </style>
</head>
<body>
  <main class="report-page">
    <h1>ई-विकास पोर्टल सत्यापन रिपोर्ट</h1>

    <section class="top-line">
      <label>पटवारी हल्‍का :</label><input id="halkaName" class="halka-name" type="text" placeholder="हल्‍का नाम" />
      <label>हल्‍का नं :</label><input id="halkaNumber" class="halka-no" type="text" placeholder="नं." />
      <label>रा.नि.वृत्‍त</label>
      <select class="circle-select" aria-label="रा.नि.वृत्‍त">
        <option value="">चुनें</option><option>मनावर</option><option>सिंघाना</option><option>बाकानेर</option><option>उमरवन</option>
      </select>
      <span class="static-place">तहसील&nbsp; मनावर&nbsp;&nbsp; जिला धार (म.प्र.)</span>
      <span class="patwari-entry"><label>पटवारी :</label><input id="patwariName" class="patwari-name" type="text" placeholder="नाम" /></span>
    </section>

    <section class="village-line"><label>ग्राम :</label><input class="village-name" type="text" placeholder="ग्राम नाम" /></section>

    <div class="screen-only controls"><button id="addRow" type="button">नया आवेदक जोड़े</button><button id="printReport" type="button">प्रिंट करें</button></div>

    <table id="reportTable">
      <thead><tr><th class="col-serial">क्र.</th><th class="col-name">आवेदक का नाम</th><th class="col-count">कुल<br>आवेदित<br>सर्वे नं</th><th class="col-survey">सर्वे नं विवरण</th><th class="col-area">रकबा विवरण<br>(हे.)</th><th class="col-reason">आवेदन का कारण</th><th class="col-status">सत्‍यापित/<br>असत्‍यापित</th><th class="col-comment">टिप्‍पणी</th><th class="col-delete screen-only">हटाएं</th></tr></thead>
      <tbody></tbody>
    </table>

    <div class="screen-only signature-upload"><label class="upload-label" for="signatureInput">हस्‍ताक्षर इमेज अपलोड करें</label><input id="signatureInput" class="hidden-file" type="file" accept="image/*" /></div>
    <section class="signature-section">
      <img id="signaturePreview" class="signature-preview" alt="हस्ताक्षर" />
      <div class="signature-title">पटवारी हस्‍ताक्षर</div>
      <div>पटवारी हल्‍का : <span id="bottomHalka">-</span></div>
      <div>हल्‍का नं. : <span id="bottomNumber">-</span></div>
      <div>पटवारी : <span id="bottomPatwari">-</span></div>
      <div>दिनांक : <span id="dateTime"></span></div>
    </section>
  </main>

  <script>
    const reasons = ['फार्मर आई.डी. ना हाेना','ई-विकास पोर्टल पर संपूर्ण भूमि जानकारी नहीं आने से','मृतक किसान के वारिसों में से किसी एक द्वारा प्रतिनिधि के तौर पर','शामिल खाते में से किसी एक द्वारा सभी की सहमति से प्रतिनिधि के तौर पर','सिकमी किसान द्वारा असली भू-स्‍वामी की सहमति से','भू-स्‍वामी के चलने-फिरने में अक्षम हाेने की दशा में प्रतिनिधि द्वारा','अन्‍य कारण'];
    const tbody = document.querySelector('#reportTable tbody');
    const makeOption = text => `<option>${text}</option>`;

    function renderSurveyFields(row, count) {
      const surveyCell = row.querySelector('.survey-fields');
      const areaCell = row.querySelector('.area-fields');
      const safeCount = Math.max(1, Number(count) || 1);
      surveyCell.innerHTML = '';
      areaCell.innerHTML = '';
      for (let i = 0; i < safeCount; i++) {
        surveyCell.insertAdjacentHTML('beforeend', '<input class="survey-box" type="text" placeholder="सर्वे नं." />');
        areaCell.insertAdjacentHTML('beforeend', '<input class="area-box" type="text" placeholder="रकबा" />');
      }
    }

    function renumberRows() { [...tbody.rows].forEach((row, index) => row.querySelector('.serial').textContent = `${index + 1}.`); }

    function addApplicantRow() {
      const row = tbody.insertRow();
      row.innerHTML = `<td class="serial"></td><td><textarea class="table-textarea" placeholder="आवेदक का नाम लिखें"></textarea></td><td><input class="table-input count-input" type="number" min="1" value="1" placeholder="कुल सर्वे" /></td><td class="survey-fields"></td><td class="area-fields"></td><td><select class="table-select reason-select"><option value="">कारण चुनें</option>${reasons.map(makeOption).join('')}</select></td><td><select class="table-select"><option>सत्‍यापित</option><option>असत्‍यापित</option></select></td><td><textarea class="table-textarea" placeholder="टिप्‍पणी लिखें"></textarea></td><td class="delete-cell screen-only"><button type="button" class="delete-row">हटाएं</button></td>`;
      row.querySelector('.count-input').addEventListener('input', e => renderSurveyFields(row, e.target.value));
      row.querySelector('.delete-row').addEventListener('click', () => { row.remove(); renumberRows(); });
      renderSurveyFields(row, 1);
      renumberRows();
    }

    function updateFooter() {
      bottomHalka.textContent = halkaName.value || '-';
      bottomNumber.textContent = halkaNumber.value || '-';
      bottomPatwari.textContent = patwariName.value || '-';
      dateTime.textContent = new Date().toLocaleString('hi-IN', { day:'numeric', month:'numeric', year:'numeric', hour:'numeric', minute:'numeric', second:'numeric', hour12:true });
    }

    addRow.addEventListener('click', addApplicantRow);
    printReport.addEventListener('click', () => { updateFooter(); window.print(); });
    [halkaName, halkaNumber, patwariName].forEach(input => input.addEventListener('input', updateFooter));
    signatureInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) signaturePreview.src = URL.createObjectURL(file);
    });
    addApplicantRow();
    updateFooter();
    setInterval(updateFooter, 1000);
  </script>
</body>
</html>
